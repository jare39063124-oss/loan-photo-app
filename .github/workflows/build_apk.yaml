name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk
      ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/android-ndk-r25c

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            autoconf automake libtool libffi-dev libssl-dev cmake \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            libmtdev-dev xclip xsel

      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer kivy[base] openpyxl plyer pillow cython

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip
          unzip -q commandlinetools.zip -d $ANDROID_HOME/cmdline-tools/
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "platforms;android-33" "build-tools;33.0.0"

      - name: Setup NDK
        run: |
          mkdir -p $ANDROID_HOME/ndk
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip -d /tmp/
          cp -r /tmp/android-ndk-r25c $ANDROID_HOME/ndk/
          ls $ANDROID_HOME/ndk/android-ndk-r25c/

      - name: Write local.properties
        run: |
          sed -i '/^sdk.dir/d;/^android.ndk_path/d;/^android.build_tools_version/d' local.properties 2>/dev/null || true
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "android.ndk_path=$ANDROID_HOME/ndk/android-ndk-r25c" >> local.properties
          echo "android.build_tools_version=33.0.0" >> local.properties
          echo "android.api=33" >> local.properties
          echo "android.arch=arm64-v8a" >> local.properties
          echo "android.orientation=portrait" >> local.properties
          cat local.properties

      - name: Build debug APK
        timeout: 600
        run: |
          buildozer android debug
          ls -la bin/ 2>/dev/null || echo "No bin directory"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-photo-apk
          path: bin/*.apk
