name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk
      ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/android-ndk-r25c

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip \
          autoconf automake libtool libffi-dev libssl-dev cmake \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          libmtdev-dev xclip xsel

    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer kivy[base] openpyxl plyer pillow cython

    - name: Setup Android SDK
      run: |
        set -e
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools/
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
          "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Setup NDK
      run: |
        set -e
        mkdir -p $ANDROID_HOME/ndk
        cd /tmp
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -O ndk.zip
        unzip -q ndk.zip -d /tmp/
        cp -r /tmp/android-ndk-r25c $ANDROID_HOME/ndk/
        ls $ANDROID_HOME/ndk/android-ndk-r25c/

    - name: Write local.properties
      run: |
        cat > local.properties << EOF
        sdk.dir=$ANDROID_HOME
        android.ndk_path=$ANDROID_HOME/ndk/android-ndk-r25c
        android.build_tools_version=33.0.0
        android.api=33
        android.arch=arm64-v8a
        orientation=portrait
        fullscreen=0
        log_level=2
        EOF
        cat local.properties

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: loan-photo-apk
        path: bin/*.apk
