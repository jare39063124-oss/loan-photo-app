name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip \
          autoconf automake libtool libffi-dev libssl-dev cmake \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          libmtdev-dev xclip xsel

    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython

    - name: Pre-accept Android SDK licenses
      run: |
        set -e
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        CMDLINE_DIR="$SDK_DIR/cmdline-tools/latest"
        mkdir -p "$CMDLINE_DIR"
        # Download & extract cmdline-tools if not present
        if [ ! -f "$CMDLINE_DIR/bin/sdkmanager" ]; then
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$SDK_DIR/cmdline-tools/"
          mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$CMDLINE_DIR"
        fi
        # Accept all licenses
        yes | "$CMDLINE_DIR/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses 2>&1 || true
        # Pre-install build-tools that p4a needs (37.x)
        yes | "$CMDLINE_DIR/bin/sdkmanager" --sdk_root="$SDK_DIR" "build-tools;37.0.0" 2>&1 || true
        echo "SDK ready"

    - name: Build debug APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: loan-photo-apk
        path: bin/*.apk
