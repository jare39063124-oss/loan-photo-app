name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip openjdk-17-jdk \
          autoconf automake libtool libffi-dev libssl-dev \
          cmake \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          libmtdev-dev xclip xsel

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer
        pip install kivy[base]
        pip install openpyxl plyer pillow
        pip install cython

    - name: Setup Android SDK + NDK
      run: |
        set -e
        # Download cmdline tools
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools/
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest

        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

        # Install SDK components
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

        # Download NDK 25.2.9519653 directly from Google
        mkdir -p $ANDROID_HOME/ndk
        cd /tmp
        wget -q "https://dl.google.com/android/repository/android-ndk-r25c-linux.zip" -O ndk.zip
        unzip -q ndk.zip -d $ANDROID_HOME/ndk/
        mv $ANDROID_HOME/ndk/android-ndk-r25.2.9519653 $ANDROID_HOME/ndk/25.2.9519653 2>/dev/null || \
          mv $ANDROID_HOME/ndk/android-ndk-r25* $ANDROID_HOME/ndk/25.2.9519653 2>/dev/null || true

        # Write local.properties
        cat > $GITHUB_WORKSPACE/local.properties << EOF
        sdk.dir=$ANDROID_HOME
        android.ndk_path=$ANDROID_HOME/ndk/25.2.9519653
        android.sdk_path=$ANDROID_HOME
        android.api=33
        android.build_tools_version=33.0.0
        android.ndk_version=25.2.9519653
        android.arch=arm64-v8a
        orientation=portrait
        fullscreen=0
        log_level=2
        warn_on_root=1
        EOF

        # Verify
        echo "=== SDK Contents ==="
        ls $ANDROID_HOME/
        echo "=== Build Tools ==="
        ls $ANDROID_HOME/build-tools/33.0.0/ | head
        echo "=== NDK ==="
        ls $ANDROID_HOME/ndk/25.2.9519653/ | head
        echo ""
        echo "=== aidl check ==="
        ls -la $ANDROID_HOME/build-tools/33.0.0/aidl

    - name: Build debug APK
      timeout: 600
      run: |
        set -e
        echo "=== local.properties ==="
        cat local.properties
        echo "=== Starting build ==="
        buildozer android debug
        echo "=== Build complete ==="
        ls -la bin/

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: loan-photo-apk
        path: bin/*.apk

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
