name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zip unzip \
          autoconf automake libtool libffi-dev libssl-dev cmake \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          libmtdev-dev xclip xsel patchelf cpio rsync

    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer cython

    - name: Build APK
      run: |
        set -x
        export PATH="$HOME/.buildozer/android/platform/apache-ant-1.9.4/bin:$PATH"
        buildozer android clean 2>&1 | tail -3 || true
        buildozer android debug 2>&1 | tee /tmp/build.log
        echo "=== Build exit: $? ==="
        ls -la bin/ 2>/dev/null || echo "No bin/ directory"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: loan-photo-apk
        path: bin/*.apk
